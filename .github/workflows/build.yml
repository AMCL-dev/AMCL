name: CI Package

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build-windows:
    runs-on: windows-latest
    if: startsWith(github.event.head_commit.message, 'ci:') || startsWith(github.event.head_commit.message, 'ci-')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows executable
        run: flutter build windows --release

      - name: Download Enigma Virtual Box installer
        run: curl -L -o enigmavb.exe https://enigmaprotector.com/assets/files/enigmavb.exe

      - name: Install Enigma Virtual Box (silent, to fixed path)
        run: |
          Start-Process -Wait -FilePath .\enigmavb.exe -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP- /DIR=`"C:\EnigmaVB`""
          # 等待一秒确保文件释放
          Start-Sleep -Seconds 1

      - name: Verify evb.exe exists
        run: |
          if (Test-Path "C:\EnigmaVB\evb.exe") {
            Write-Host "evb.exe found at C:\EnigmaVB\evb.exe"
          } else {
            Write-Error "evb.exe not found after installation"
            exit 1
          }

      - name: Run Enigma Virtual Box
        run: |
          & "C:\EnigmaVB\evb.exe" "${{ github.workspace }}\package.windows.evb" /build

      - name: Rename output to AMCL.exe
        run: |
          $outputPath = "${{ github.workspace }}\build\amcl_boxed.exe"
          if (Test-Path $outputPath) {
            Move-Item -Path $outputPath -Destination "${{ github.workspace }}\AMCL.exe" -Force
          } else {
            Write-Error "Output amcl_boxed.exe not found at $outputPath"
            exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: ${{ github.workspace }}\AMCL.exe

  build-macos:
    runs-on: macos-latest
    if: startsWith(github.event.head_commit.message, 'ci:') || startsWith(github.event.head_commit.message, 'ci-')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Rename .app to AMCL.app
        run: |
          mv build/macos/Build/Products/Release/amcl.app build/macos/Build/Products/Release/AMCL.app 2>/dev/null || \
          mv build/macos/Build/Products/Release/*.app build/macos/Build/Products/Release/AMCL.app

      - name: Package as DMG
        run: |
          brew install create-dmg
          create-dmg --volname "AMCL" --window-pos 200 120 --window-size 800 400 \
            --icon-size 100 --app-drop-link 600 185 \
            "AMCL.dmg" "build/macos/Build/Products/Release/AMCL.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: AMCL.dmg

  build-linux:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'ci:') || startsWith(github.event.head_commit.message, 'ci-')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
                                  dpkg rpm file wget

      - name: Install fpm (with sudo)
        run: |
          sudo gem install --no-document fpm

      - name: Install appimagetool
        run: |
          wget -c "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Install linuxdeploy
        run: |
          wget -c "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux executable
        run: flutter build linux --release

      - name: Get binary name
        id: get_bin
        run: |
          BIN_NAME=$(flutter pub get --dry-run 2>/dev/null | grep -oP 'name: \K\S+' || echo "amcl")
          echo "BIN_NAME=$BIN_NAME" >> $GITHUB_ENV
          echo "BIN_PATH=build/linux/x64/release/bundle/$BIN_NAME" >> $GITHUB_ENV

      - name: Prepare AppDir for AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp ${{ env.BIN_PATH }} AppDir/usr/bin/amcl
          # 复制依赖库（如果有）
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/ 2>/dev/null || true
          cat > AppDir/amcl.desktop <<EOF
          [Desktop Entry]
          Name=AMCL
          Exec=amcl
          Icon=amcl
          Type=Application
          Categories=Utility;
          EOF

      - name: Build AppImage using linuxdeploy
        run: |
          export ARCH=x86_64
          linuxdeploy --appdir AppDir --output appimage
          # 重命名输出
          mv AMCL*.AppImage AMCL.AppImage 2>/dev/null || mv *.AppImage AMCL.AppImage

      - name: Build .deb with fpm
        run: |
          mkdir -p deb_package/usr/local/bin
          cp ${{ env.BIN_PATH }} deb_package/usr/local/bin/AMCL
          chmod +x deb_package/usr/local/bin/AMCL
          fpm -s dir -t deb -n amcl -v 1.0.0 --description "AMCL Application" \
            -C deb_package .
          mv amcl_1.0.0_amd64.deb AMCL.deb

      - name: Build .rpm with fpm
        run: |
          mkdir -p rpm_package/usr/local/bin
          cp ${{ env.BIN_PATH }} rpm_package/usr/local/bin/AMCL
          chmod +x rpm_package/usr/local/bin/AMCL
          fpm -s dir -t rpm -n amcl -v 1.0.0 --description "AMCL Application" \
            -C rpm_package .
          mv amcl-1.0.0-1.x86_64.rpm AMCL.rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            AMCL.AppImage
            AMCL.deb
            AMCL.rpm